name: Deploy Hexo to GitHub Pages

# Action: 只要Push 到main，就执行deploy
on:
  push:
    branches:
      - main
  workflow_dispatch: # 可以于github主页手动执行

# 给予Gihub Actions的权限
permissions:
  contents: read
  pages: write
  id-token: write

# Concurrency Control
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build contents
  build:
    # Assign resource on an ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # 下载代码至此VM
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # Use npm with env set up
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Speed up npm process with cache
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build site (clean old version first)
      - name: Build site
        run: npx hexo clean && npx hexo generate

      # Generate the built artifact in ./public
      # For deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build # will only deploy after successful build

    # Actual deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
