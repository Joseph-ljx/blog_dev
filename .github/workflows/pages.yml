name: Deploy Hexo to GitHub Pages

# Which branch to deploy 
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

 
# 记得在Github -> Github Pages打开/upgrade
# 启用自动部署功能
env:
  SKIP_DEPLOY: true  # 🚫 临时关闭部署

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Using node version 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx hexo clean && npx hexo generate # Using hexo to build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

